<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#667eea">
    <title>股票分析工具 - Trade Review</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>股票分析工具</h1>
            <p class="subtitle">关注池监控 · 板块热力图 · 短线趋势分析 · 预测验证池</p>
        </header>

        <!-- Tab Navigation -->
        <nav class="tab-nav" role="tablist">
            <button class="tab-btn active" data-tab="watchlist" role="tab" aria-selected="true">📋 关注池</button>
            <button class="tab-btn" data-tab="heatmap" role="tab" aria-selected="false">🔥 板块热力图</button>
            <button class="tab-btn" data-tab="trend" role="tab" aria-selected="false">📈 趋势分析</button>
        </nav>

        <!-- Tab Panel: Watchlist -->
        <div id="watchlistPanel" class="tab-panel active" role="tabpanel">
            <div class="add-stock-section">
                <h2>添加股票</h2>
                <form id="addStockForm">
                    <div class="form-group">
                        <label for="stockCode">股票代码:</label>
                        <input type="text" id="stockCode" placeholder="例: 000001" required>
                    </div>
                    <div class="form-group">
                        <label for="sellPrice">卖出价格 (¥):</label>
                        <input type="number" id="sellPrice" step="0.01" min="0.01" placeholder="例: 14.00" required>
                    </div>
                    <button type="submit" class="btn-add">添加到关注池</button>
                </form>
                <div id="stockPreview" class="stock-preview" style="display: none;" role="status" aria-live="polite">
                    <h3>股票信息预览</h3>
                    <p><strong>代码:</strong> <span id="previewCode"></span></p>
                    <p><strong>名称:</strong> <span id="previewName"></span></p>
                    <p><strong>当前价格:</strong> ¥<span id="previewPrice"></span></p>
                </div>
            </div>

            <div class="watchlist-section">
                <div class="watchlist-header">
                    <h2>关注池股票列表</h2>
                    <button id="refreshAllBtn" class="btn-refresh-all">🔄 刷新所有价格</button>
                </div>
                <div id="stockList" class="stock-list" role="region" aria-live="polite" aria-label="股票关注列表">
                    <p class="empty-message">关注池为空，请添加股票</p>
                </div>
            </div>
        </div>

        <!-- Tab Panel: Sector Heatmap -->
        <div id="heatmapPanel" class="tab-panel" role="tabpanel">
            <div class="heatmap-section">
                <div class="heatmap-header">
                    <h2>板块热力图</h2>
                    <div class="heatmap-controls">
                        <button id="refreshHeatmapBtn" class="btn-refresh-all">🔄 刷新数据</button>
                        <span id="heatmapUpdateTime" class="update-time"></span>
                    </div>
                </div>
                <div class="heatmap-legend">
                    <span class="legend-item legend-deep-red">大涨 &gt;3%</span>
                    <span class="legend-item legend-light-red">上涨 1~3%</span>
                    <span class="legend-item legend-yellow">平盘 ±1%</span>
                    <span class="legend-item legend-light-green">下跌 -1~-3%</span>
                    <span class="legend-item legend-deep-green">大跌 &lt;-3%</span>
                </div>
                <div id="sectorHeatmap" class="sector-heatmap" role="region" aria-label="板块热力图" aria-live="polite">
                    <p class="empty-message">加载中...</p>
                </div>
                <p class="heatmap-disclaimer">* 数据为模拟示意，仅供参考，不构成投资建议</p>
            </div>
        </div>

        <!-- Tab Panel: Trend Analysis -->
        <div id="trendPanel" class="tab-panel" role="tabpanel">
            <div class="trend-section">
                <div class="trend-header">
                    <h2>短线趋势分析</h2>
                </div>
                <div class="trend-search">
                    <div class="form-group" style="margin-bottom: 0; flex: 1;">
                        <label for="trendStockCode">输入股票代码进行分析:</label>
                        <input type="text" id="trendStockCode" placeholder="例: 600519" maxlength="6">
                    </div>
                    <button id="analyzeTrendBtn" class="btn-analyze">🔍 分析</button>
                </div>
                <div id="trendResult" class="trend-result" style="display: none;" aria-live="polite">
                    <!-- Trend analysis results rendered by JS -->
                </div>

                <!-- Adaptive Model Status Panel -->
                <div class="model-status-panel" id="modelStatusPanel">
                    <p class="ms-loading">🧠 模型加载中...</p>
                </div>

                <div class="trend-watchlist-section">
                    <h3>关注池股票趋势</h3>
                    <div id="trendWatchlist" class="trend-watchlist">
                        <p class="empty-message">关注池为空，请在关注池标签页添加股票</p>
                    </div>
                </div>

                <!-- Validation Pool -->
                <div class="validation-pool-section">
                    <div class="validation-pool-header">
                        <h3>验证池</h3>
                        <button id="cvToggleBtn" class="btn-cv-start">▶ 开启持续验证</button>
                        <button id="clearPoolBtn" class="btn-clear-pool">🗑 清空</button>
                    </div>
                    <div id="cvStatusBar" class="cv-status-bar" style="display:none;"></div>
                    <div id="validationPoolContainer" class="validation-pool-container">
                        <p class="empty-message">验证池为空，在趋势分析中添加预测进行验证</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
