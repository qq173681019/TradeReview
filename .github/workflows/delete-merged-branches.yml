name: Delete Merged Branches

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list branches without deleting)'
        required: false
        default: 'false'
        type: boolean

jobs:
  delete-branch-on-merge:
    name: Delete branch after PR merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Delete merged branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            if (branch === 'main') {
              console.log('Skipping deletion of main branch');
              return;
            }
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              console.log(`Deleted branch: ${branch}`);
            } catch (error) {
              console.log(`Could not delete branch ${branch}: ${error.message}`);
            }

  cleanup-stale-branches:
    name: Clean up stale branches
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Delete stale branches
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ github.event.inputs.dry_run }}' === 'true';
            const protectedBranches = ['main'];

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            // Find branches that have been fully merged into main (no commits ahead)
            const staleBranches = [];
            for (const branch of branches) {
              if (protectedBranches.includes(branch.name)) continue;
              try {
                const comparison = await github.rest.repos.compareCommits({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  base: 'main',
                  head: branch.name,
                });
                // Branch is merged if it has no commits ahead of main
                if (comparison.data.ahead_by === 0) {
                  staleBranches.push(branch.name);
                }
              } catch (error) {
                // If comparison fails, skip this branch
                console.log(`Could not compare ${branch.name}: ${error.message}`);
              }
            }

            if (staleBranches.length === 0) {
              console.log('No stale merged branches found.');
              return;
            }

            console.log(`Found ${staleBranches.length} merged branch(es) to delete:`);
            for (const branchName of staleBranches) {
              console.log(`  - ${branchName}`);
              if (!dryRun) {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${branchName}`,
                  });
                  console.log(`    Deleted.`);
                } catch (error) {
                  console.log(`    Error: ${error.message}`);
                }
              }
            }

            if (dryRun) {
              console.log('Dry run complete. No branches were deleted.');
            }
